<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="/ui/static/app.css">
</head>
<body>
    <header class="topbar">
        <div>
            <h1>{{ title }}</h1>
            <p class="muted">Panel operativo de `conti-backend` — Circuitos, Hermes, MCP, Observabilidad</p>
        </div>
        <div class="topbar-links">
            <a href="/docs" target="_blank" rel="noreferrer">API Docs</a>
            <a href="/mcp/tools" target="_blank" rel="noreferrer">MCP JSON</a>
            <a href="/health" target="_blank" rel="noreferrer">Health</a>
        </div>
    </header>

    <nav class="nav">
        {% for item in nav_items %}
        <a href="{{ item.href }}" class="nav-link{% if request.url.path == item.href %} active{% endif %}">{{ item.label }}</a>
        {% endfor %}
    </nav>

    <main class="layout">
        {% block content %}{% endblock %}
    </main>

    <script src="/ui/static/app.js"></script>
</body>
</html>
